services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # Credenciales OAuth montadas como volumen — nunca dentro de la imagen
      - ./backend/token.json:/app/token.json
      - ./backend/credentials.json:/app/credentials.json
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped
